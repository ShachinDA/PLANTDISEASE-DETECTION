<!DOCTYPE html>

<html>

<head>
<title>PlantCare AI Result</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family:"Segoe UI", Arial, sans-serif;

/* Leaf background */

background-image:url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* Dark overlay */

body::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.45);

z-index:-1;

}

/* Main result card */

.container{

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

padding:45px;

border-radius:16px;

text-align:center;

width:450px;

color:white;

box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

/* Title */

h1{

font-size:30px;

margin-bottom:20px;

}

/* Image */

.result-image{

margin:20px 0;

}

.result-image img{

width:300px;

border-radius:12px;

box-shadow:0px 10px 25px rgba(0,0,0,0.4);

}

/* Prediction text */

.prediction{

font-size:20px;

margin-top:10px;

margin-bottom:25px;

font-weight:600;

}

/* Button */

button{

padding:12px 28px;

border:none;

border-radius:10px;

background:#2e7d32;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#1b5e20;

transform:scale(1.05);

}

</style>

</head>

<body>

<div class="container">

<h1>🌿 PlantCare AI Result</h1>

<div class="result-image">

<img src="{{ url_for('static', filename='uploads/' + filename) }}">

</div>

<div class="prediction">

Prediction: {{ prediction }}

</div>

<a href="/">

<button>Upload Another Image</button>

</a>

</div>

</body>
</html>
