<!DOCTYPE html>

<html>

<head>
<title>Plant Disease Detection</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{

font-family: "Segoe UI", Arial, sans-serif;

/* Background image */

background-image:url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6");

background-size:cover;
background-position:center;
background-repeat:no-repeat;

height:100vh;

display:flex;
justify-content:center;
align-items:center;

}

/* Dark overlay */

body::before{

content:"";

position:absolute;

top:0;
left:0;

width:100%;
height:100%;

background:rgba(0,0,0,0.45);

z-index:-1;

}

/* Main container */

.container{

background:rgba(255,255,255,0.15);

backdrop-filter:blur(10px);

padding:45px;

border-radius:16px;

text-align:center;

width:420px;

color:white;

box-shadow:0 15px 40px rgba(0,0,0,0.5);

}

/* Title */

h1{

font-size:32px;

margin-bottom:10px;

}

/* Description */

p{

margin-bottom:20px;

font-size:15px;

}

/* File input */

input[type="file"]{

margin-top:10px;

margin-bottom:20px;

}

/* Button */

button{

padding:12px 28px;

border:none;

border-radius:10px;

background:#2e7d32;

color:white;

font-size:16px;

font-weight:600;

cursor:pointer;

transition:0.3s;

}

button:hover{

background:#1b5e20;

transform:scale(1.05);

}

/* Image preview */

.preview{

margin-top:20px;

}

.preview img{

border-radius:10px;

box-shadow:0px 8px 20px rgba(0,0,0,0.4);

}

</style>

</head>

<body>

<div class="container">

<h1>🌿 Plant Disease Detection</h1>

<p>Upload a leaf image to detect plant diseases using AI</p>

<form action="/upload" method="POST" enctype="multipart/form-data">

<input type="file"
name="leaf_image"
accept="image/*"
onchange="previewImage(event)"
required>

<div class="preview">

<img id="imagePreview" width="300" style="display:none;">

</div>

<br>

<button type="submit">Predict Disease</button>

</form>

</div>

<script>

function previewImage(event){

const reader = new FileReader();

reader.onload = function(){

const output = document.getElementById('imagePreview');

output.src = reader.result;

output.style.display = "block";

}

reader.readAsDataURL(event.target.files[0]);

}

</script>

</body>
</html>
